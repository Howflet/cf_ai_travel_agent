#:schema node_modules/wrangler/config-schema.json
name = "cf-ai-travel-agent"
main = "src/index.ts"
compatibility_date = "2025-02-28"
compatibility_flags = ["nodejs_compat"]

# ── Workers AI ──────────────────────────────────────────────
[ai]
binding = "AI"

# ── Durable Objects ────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "CHAT_SESSION", class_name = "ChatSession" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChatSession"]

# ── Workflows ──────────────────────────────────────────────
[[workflows]]
name = "travel-agent-workflow"
binding = "TRAVEL_WORKFLOW"
class_name = "TravelAgentWorkflow"

# ── Environment Variables ──────────────────────────────────
# API keys are loaded from `.dev.vars` for local dev (see README.md).
# For production, use `wrangler secret put <KEY_NAME>`.
# Required secrets: AMADEUS_API_KEY, AMADEUS_API_SECRET,
#   FOURSQUARE_API_KEY, OPENWEATHERMAP_API_KEY

[vars]
WORKER_BASE_URL = "http://localhost:8787"
